<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовой поиск на Яндекс Музыке</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }
        .search-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            color: #fff;
            background-color: #ff3333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .search-btn:hover {
            background-color: #e60000;
        }
        .status {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #555;
            height: 30px;
        }
    </style>
</head>
<body>

    <button class="search-btn" id="start-btn">🎙️ Сказать песню</button>
    <div class="status" id="status-text">Нажмите на кнопку и говорите...</div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            document.getElementById('status-text').textContent = "Ваш браузер не поддерживает голосовое распознавание.";
            document.getElementById('start-btn').disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            const startBtn = document.getElementById('start-btn');
            const statusText = document.getElementById('status-text');

            startBtn.addEventListener('click', () => {
                recognition.start();
                statusText.textContent = "Слушаю название песни...";
            });

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                statusText.textContent = `Включаю: "${speechResult}"`;
                
                // Исправленный адрес: направляет строго на Музыку и активирует автоплеер
                const encodedQuery = encodeURIComponent(speechResult);
                const playMusicUrl = `https://yandex.ru{encodedQuery}&play=1`;
                
                setTimeout(() => {
                    window.open(playMusicUrl, '_blank');
                    statusText.textContent = "Нажмите на кнопку и говорите...";
                }, 1000);
            };

            recognition.onerror = (event) => {
                statusText.textContent = `Ошибка: ${event.error}. Попробуйте еще раз.`;
            };

            recognition.onspeechend = () => {
                recognition.stop();
            };
        }
    </script>
</body>
</html>
