<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовой запуск музыки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffffff;
            color: #333;
            margin: 0;
        }
        .search-btn {
            padding: 25px 50px;
            font-size: 1.6rem;
            color: #fff;
            background-color: #4285F4;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
            transition: all 0.2s ease;
        }
        .search-btn:hover {
            background-color: #357ae8;
            transform: scale(1.03);
        }
        .status {
            margin-top: 25px;
            font-size: 1.3rem;
            color: #666;
            height: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <button class="search-btn" id="start-btn">🎙️ Сказать песню</button>
    <div class="status" id="status-text">Нажмите на кнопку и говорите...</div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            document.getElementById('status-text').textContent = "Ваш браузер не поддерживает распознавание речи.";
            document.getElementById('start-btn').disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            const startBtn = document.getElementById('start-btn');
            const statusText = document.getElementById('status-text');

            startBtn.addEventListener('click', () => {
                recognition.start();
                statusText.textContent = "Слушаю вас...";
            });

            recognition.onresult = (event) => {
                const speechResult = event.results.transcript;
                statusText.textContent = `Ищу трек: "${speechResult}"`;
                
                // Добавляем маркер действия, чтобы Google сразу открыл музыкальный плеер
                const fullQuery = speechResult + " слушать";
                const encodedQuery = encodeURIComponent(fullQuery);
                
                // Формируем чистую ссылку на поиск Google
                const playUrl = `https://google.com{encodedQuery}`;
                
                setTimeout(() => {
                    window.open(playUrl, '_blank');
                    statusText.textContent = "Нажмите на кнопку и говорите... ";
                }, 1200);
            };

            recognition.onerror = (event) => {
                statusText.textContent = `Ошибка: ${event.error}. Попробуйте еще раз.`;
            };

            recognition.onspeechend = () => {
                recognition.stop();
            };
        }
    </script>
</body>
</html>
